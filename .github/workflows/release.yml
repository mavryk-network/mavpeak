name: release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: "github.com/mavryk-network/*"
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.22.0'
      - name: Configure git for private modules
        env:
          TOKEN: ${{ secrets.PAT }}
        run: git config --global url."https://cryi:${TOKEN}@github.com".insteadOf "https://github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: inject version and codename
        # PEAK_VERSION = "<VERSION>"
        # PEAK_CODENAME = "<CODENAME>"
        env: 
          MAVPEAK_VERSION: ${{ github.ref_name }}
          MAVPEAK_CODENAME: Mont Saint Michel
        run: |
          # patch constants/common.go
          sed -i "s/MAVPEAK_VERSION[[:space:]]*= \".*\"/MAVPEAK_VERSION = \"$MAVPEAK_VERSION\"/g" constants/common.go
          sed -i "s/MAVPEAK_CODENAME[[:space:]]*= \".*\"/MAVPEAK_CODENAME = \"$MAVPEAK_CODENAME\"/g" constants/common.go
          # patch web/src/common/constants.ts
          sed -i "s/MAVPEAK_VERSION[[:space:]]*= \".*\"/MAVPEAK_VERSION = \"$MAVPEAK_VERSION\"/g" web/src/common/constants.ts
          sed -i "s/MAVPEAK_CODENAME[[:space:]]*= \".*\"/MAVPEAK_CODENAME = \"$MAVPEAK_CODENAME\"/g" web/src/common/constants.ts

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Clone web to dist
        run: cp -r web/build/* web/dist

      # - name: Test
      #   run: go test -v ./...

      - name: Build win-arm64
        run: env CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-win-arm64.exe
      - name: Build win-amd64
        run: env CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-win-amd64.exe
      - name: Build linux-arm64
        run: env CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-linux-arm64
      - name: Build linux-riscv64
        run: env CGO_ENABLED=0 GOOS=linux GOARCH=riscv64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-linux-riscv64
      - name: Build linux-amd64
        run: env CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-linux-amd64
      - name: Build macos-arm64
        run: env CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-macos-arm64
      - name: Build macos-amd64
        run: env CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o bin/mavpeak-macos-amd64

      - name: Upload files to a GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          tag: ${{ github.ref }}
          file: bin/mavpeak*
          
