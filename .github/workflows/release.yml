  notify:
    runs-on: ubuntu-latest
    needs: [build] #, build-containers]
    steps:
      - name: Ami mavpeak Repository Dispatch
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.MVD_AMI_MAVPEAK_ACCESS }}
          repository: mavryk-network/ami-mavpeak
          event-type: mavpeak-release
          client-payload: '{ "id": "${{ steps.repository_info.outputs.ID }}", "repository": "${{github.repository}}", "version": "${{github.ref_name}}" }'

